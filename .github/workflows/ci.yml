name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-checks:
    name: Source checks
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check formatting
        run: |
          nix build -L .#checks.x86_64-linux.format
          nix build -L .#checks.x86_64-linux.nix-fmt

  build-checks:
    name: ${{ matrix.system }} / ${{ matrix.check }}
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        system:
          - x86_64-linux
        check:
          - build
          - clippy
        include:
          - system: x86_64-linux
            runner: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run Nix check
        run: nix build -L ".#checks.${{ matrix.system }}.${{ matrix.check }}"
