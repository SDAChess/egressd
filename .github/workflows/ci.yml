name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Rust formatting
            check: format
          - name: Nix formatting
            check: nix-fmt
          - name: Clippy
            check: clippy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run source check
        run: nix build -L ".#checks.x86_64-linux.${{ matrix.check }}"

  build-checks:
    name: ${{ matrix.system }} / ${{ matrix.check }}
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        system:
          - x86_64-linux
        check:
          - build
        include:
          - system: x86_64-linux
            runner: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Run the Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run Nix check
        run: nix build -L ".#checks.${{ matrix.system }}.${{ matrix.check }}"
